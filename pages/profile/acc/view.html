<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil — Trinity</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="pickerpref/picker.css">
    <link rel="icon" type="image/png" href="../../../assets/favicon.ico">
    <link rel="stylesheet" href="/Trinity-page/components/nav.css">
</head>
<body>

<!-- ══ NAV (igual al index) ══ -->
<script src="/Trinity-page/components/nav.js"></script>

<!-- ══ MAIN LAYOUT ══ -->
<main class="profile-layout">

    <!-- COLUMNA IZQUIERDA: CARD DE PERFIL -->
    <aside class="profile-card" id="profile-card">
        <div class="profile-photo-wrap">
            <div class="profile-photo" id="ph-photo">?</div>
        </div>
        <div class="profile-card-info">
            <h1 class="profile-card-name" id="ph-nombre">—</h1>
            <p class="profile-card-user" id="ph-usuario">@—</p>
            <p class="profile-card-pronouns" id="ph-pronouns"></p>

            <!-- OWNER: botón editar + seguidores -->
            <div id="owner-actions" style="display:none;">
                <a href="../cfg/edit.html" class="btn-edit-profile">Editar perfil</a>
                <button class="profile-followers followers-btn" id="ph-followers-own" onclick="toggleFollowersPopup(this)">
                    <span id="ph-seg-own">0</span> Seguidos
                    <span class="fp-sep">·</span>
                    <span id="ph-flw-own">0</span> Seguidores
                </button>
            </div>

            <!-- OTHER: botón seguir + seguidores + stats torneos -->
            <div id="other-actions" style="display:none;">
                <button class="btn-follow" id="btn-follow" onclick="toggleFollow()">Seguir</button>
                <button class="profile-followers followers-btn" id="ph-followers-other" onclick="toggleFollowersPopup(this)">
                    <span id="ph-seg-other">0</span> Seguidos
                    <span class="fp-sep">·</span>
                    <span id="ph-flw-other">0</span> Seguidores
                </button>
            </div>

            <div class="profile-divider"></div>
            <p class="profile-desc" id="ph-desc"></p>

            <!-- Stats torneos (solo perfil ajeno) -->
            <div class="profile-stats" id="other-stats" style="display:none;">
                <div class="profile-divider"></div>
                <p class="stat-line" id="ph-torneos">0 Torneos</p>
                <p class="stat-line" id="ph-ganados">0 Torneos ganados</p>
            </div>
        </div>
    </aside>

    <!-- COLUMNA DERECHA: CONTENIDO -->
    <section class="profile-content">

        <!-- DEPORTES FAVORITOS -->
        <div id="section-deportes" style="display:none;">
            <div class="section-header">
                <h2 class="section-label">Deportes favoritos</h2>
                <div class="section-actions" id="deportes-actions"></div>
            </div>
            <div class="favorites-grid" id="grid-deportes-fav"></div>
        </div>

        <!-- VIDEOJUEGOS FAVORITOS -->
        <div id="section-videojuegos" style="display:none;">
            <div class="section-header">
                <h2 class="section-label">Videojuegos favoritos</h2>
                <div class="section-actions" id="videojuegos-actions"></div>
            </div>
            <div class="favorites-grid" id="grid-videojuegos-fav"></div>
        </div>

        <!-- Mensaje vacío cuando no hay preferencias -->
        <div id="section-empty" class="empty-prefs" style="display:none;">
            <p>Este usuario todavía no configuró sus preferencias.</p>
        </div>

    </section>
</main>

<!-- ══ MODAL: INVITAR A TORNEO ══ -->
<div class="modal-overlay" id="modal-invite" onclick="closeInviteModal(event)">
    <div class="modal-box">
        <button class="modal-close" onclick="closeInviteModalBtn()">✕</button>
        <h3 class="modal-title">Invitar a torneo</h3>
        <p class="modal-desc">Seleccioná el torneo en curso para invitar a <strong id="modal-invitee-name">este usuario</strong>.</p>
        <div id="modal-tournament-list" class="tournament-list">
            <div class="loading-spinner"></div>
        </div>
        <p class="msg err" id="msg-invite" style="min-height:18px;"></p>
    </div>
</div>

<!-- ══ POPUP: SEGUIDORES / SEGUIDOS ══ -->
<div id="followers-popup" class="fp-popup" style="display:none;">
    <div class="fp-tabs">
        <button class="fp-tab active" data-tab="seguidos"   onclick="switchFpTab('seguidos')">
            Seguidos <span class="fp-tab-count" id="fp-cnt-seguidos">0</span>
        </button>
        <button class="fp-tab"        data-tab="seguidores" onclick="switchFpTab('seguidores')">
            Seguidores <span class="fp-tab-count" id="fp-cnt-seguidores">0</span>
        </button>
    </div>
    <div class="fp-list" id="fp-list">
        <div class="fp-spinner"></div>
    </div>
</div>

<script src="pickerpref/picker.js"></script>
<script src="profile.js"></script>
</body>
</html>
