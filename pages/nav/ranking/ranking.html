<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings — Trinity</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Trinity-page/components/nav.css">
    <link rel="stylesheet" href="/Trinity-page/components/footer.css">
    <link rel="stylesheet" href="ranking.css">
    <link rel="icon" type="image/png" href="/Trinity-page/assets/favicon.ico">
</head>
<body>

<!-- ══ NAV ══ -->
<script src="/Trinity-page/components/nav.js"></script>

<!-- ══ HERO ══ -->
<section class="ranking-hero">
    <div class="ranking-hero-content">
        <p class="ranking-eyebrow">Trinity · Rankings</p>
        <h1 class="ranking-title">Tabla de posiciones</h1>
        <p class="ranking-subtitle">
            Elegí un juego para ver quién va liderando. El orden se
            calcula por torneos ganados.
        </p>
    </div>
</section>

<!-- ══ FILTROS ══ -->
<div class="filters-wrap">
    <div class="filters-scroll" id="filters-scroll"></div>
</div>

<!-- ══ RANKING ══ -->
<section class="section">
    <div class="section-header">
        <h2 class="section-title">Top jugadores</h2>
        <span class="section-hint" id="section-hint"></span>
    </div>

    <div class="podium" id="podium"></div>
    <div class="rank-list" id="rank-list"></div>
</section>

<!-- ══ FOOTER ══ -->
<script src="/Trinity-page/components/footer.js"></script>

<script src="ranking.js"></script>
</body>
</html>
