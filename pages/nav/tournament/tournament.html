<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneos — Trinity</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Trinity-page/style.css">
    <link rel="stylesheet" href="/Trinity-page/components/nav.css">
    <link rel="stylesheet" href="/Trinity-page/pages/nav/tournament/tournament.css">
    <link rel="stylesheet" href="/Trinity-page/pages/nav/tournament/gameProfile/gameProfile.css">
    <link rel="stylesheet" href="/Trinity-page/pages/nav/tournament/gameProfile/clashRoyaleStats.css">
    <link rel="stylesheet" href="/Trinity-page/pages/nav/tournament/gameProfile/fortniteStats.css">
    <link rel="stylesheet" href="/Trinity-page/pages/nav/tournament/gameProfile/brawlStarsStats.css">
    <link rel="stylesheet" href="/Trinity-page/pages/nav/tournament/gameProfile/dota2Stats.css">
    <link rel="stylesheet" href="/Trinity-page/pages/nav/tournament/gameProfile/minecraftStats.css">
    <link rel="icon" type="image/png" href="/Trinity-page/assets/favicon.ico">
</head>
<body>
<script src="/Trinity-page/assets/js/api.js"></script>
<script src="/Trinity-page/components/nav.js"></script>
<script src="/Trinity-page/pages/nav/tournament/gameProfile/gameProfile.js"></script>
<script src="/Trinity-page/pages/nav/tournament/gameProfile/clashRoyaleStats.js"></script>
<script src="/Trinity-page/pages/nav/tournament/gameProfile/fortniteStats.js"></script>
<script src="/Trinity-page/pages/nav/tournament/gameProfile/brawlStarsStats.js"></script>
<script src="/Trinity-page/pages/nav/tournament/gameProfile/dota2Stats.js"></script>
<script src="/Trinity-page/pages/nav/tournament/gameProfile/minecraftStats.js"></script>

<main class="tournaments-page">

    <div class="tournaments-header">
        <h1>TORNEOS</h1>
        <br>
        <button class="how-to-join" id="howToJoinBtn">¿CÓMO ME INSCRIBO?</button>
    </div>

    <section class="games-grid" id="gamesGrid">

        <a href="#" class="game-card game-lol" data-game="Brawl Stars" data-game-id="brawlstars">
            <div class="card-bg" style="background-image: url('/Trinity-page/assets/tournament-banner/BSBG.png');"></div>
            <div class="scrim"></div>
            <img class="game-icon" src="/Trinity-page/assets/tournament-banner/BSLogo.png" alt="Brawl Stars">
        </a>

        <a href="#" class="game-card game-clash" data-game="Clash Royale" data-game-id="clashroyale">
            <div class="card-bg" style="background-image: url('/Trinity-page/assets/tournament-banner/ClashBG.jpeg');"></div>
            <div class="scrim"></div>
            <img class="game-icon" src="/Trinity-page/assets/tournament-banner/CRLogo.png" alt="Clash Royale">
        </a>

        <a href="#" class="game-card game-cs" data-game="Dota 2" data-game-id="dota2">
            <div class="card-bg" style="background-image: url('/Trinity-page/assets/tournament-banner/D2BG.jpg');"></div>
            <div class="scrim"></div>
            <img class="game-icon" src="/Trinity-page/assets/tournament-banner/Dota2Logo.png" alt="Dota 2">
        </a>

        <a href="#" class="game-card game-valorant" data-game="Minecraft" data-game-id="minecraft">
            <div class="card-bg" style="background-image: url('/Trinity-page/assets/tournament-banner/MineBG.jpg');"></div>
            <div class="scrim"></div>
            <img class="game-icon" src="/Trinity-page/assets/tournament-banner/MinecraftLogo.png" alt="Minecraft">
        </a>

        <a href="#" class="game-card game-rocket" data-game="Rocket League">
            <div class="card-bg" style="background-image: url('/Trinity-page/assets/Missing.jpg');"></div>
            <div class="scrim"></div>
        </a>

        <a href="#" class="game-card game-fortnite" data-game="Fortnite" data-game-id="fortnite">
            <div class="card-bg" style="background-image: url('/Trinity-page/assets/tournament-banner/FortBG.jpg');"></div>
            <div class="scrim"></div>
            <img class="game-icon" src="/Trinity-page/assets/tournament-banner/FortniteICON.png" alt="Fortnite">
        </a>

    </section>

    <p class="tournaments-cta">
        PARTICIPA EN TORNEOS SEMANALES DE TUS JUEGOS FAVORITOS. INSCRÍBETE, COMPITE Y
        ESCALA POSICIONES EN EL RANKING DE TRINITY.
    </p>

    <section class="steps-section">
        <a href="#" class="login-link-tag" id="loginLinkTag">
            LINK A LOGIN
            <span class="arrow">⌄</span>
        </a>

        <ol class="steps-list">
            <li>1. <span class="crea">CREA</span> TU CUENTA</li>
            <li>2. ÚNETE A UN TORNEO</li>
            <li>3. COMPITE</li>
            <li>4. GANA PREMIOS Y PUNTOS</li>
        </ol>
    </section>

</main>

<script src="/Trinity-page/pages/nav/tournament/tournament.js"></script>

</body>
</html>
