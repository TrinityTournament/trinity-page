<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Bloquear acceso al .env desde el exterior
    <Files ".env">
        Require all denied
    </Files>

    # CORS: permitir fetch() desde el mismo origen
    <IfModule mod_headers.c>
        Header always set Access-Control-Allow-Origin  "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, X-WA-Secret, X-Admin-Key, X-CSRF-Token"
    </IfModule>

    ErrorLog  ${APACHE_LOG_DIR}/trinity_error.log
    CustomLog ${APACHE_LOG_DIR}/trinity_access.log combined
</VirtualHost>