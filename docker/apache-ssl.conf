# ══════════════════════════════════════════════════════════
#  TRINITY — Apache con SSL
#  Reemplaza docker/apache.conf cuando SSL esté habilitado.
#
#  Desarrollo local:
#    SSLCertificateFile    /etc/ssl/trinity/trinity.crt
#    SSLCertificateKeyFile /etc/ssl/trinity/trinity.key
#
#  Producción (Let's Encrypt):
#    SSLCertificateFile    /etc/letsencrypt/live/tu-dominio/fullchain.pem
#    SSLCertificateKeyFile /etc/letsencrypt/live/tu-dominio/privkey.pem
# ══════════════════════════════════════════════════════════

# ── Redirigir HTTP → HTTPS ─────────────────────────────────
<VirtualHost *:80>
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────
<VirtualHost *:443>
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile    /etc/ssl/trinity/trinity.crt
    SSLCertificateKeyFile /etc/ssl/trinity/trinity.key

    # Protocolos seguros (deshabilitar SSL/TLS obsoletos)
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder off

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Bloquear acceso al .env desde el exterior
    <Files ".env">
        Require all denied
    </Files>

    <IfModule mod_headers.c>
        # CORS
        Header always set Access-Control-Allow-Origin  "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, X-WA-Secret, X-Admin-Key, X-CSRF-Token"

        # HSTS — activar solo en producción con dominio real
        # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

        # Seguridad adicional
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-Content-Type-Options "nosniff"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>

    ErrorLog  ${APACHE_LOG_DIR}/trinity_error.log
    CustomLog ${APACHE_LOG_DIR}/trinity_access.log combined
</VirtualHost>